  <circle cx="125" cy="110" r="5" fill="#1E293B"/>

  <!-- Antennae -->
  <rect x="92" y="45" width="4" height="25" rx="2" fill="#1E293B" transform="rotate(-20 94 58)"/>
  <rect x="124" y="45" width="4" height="25" rx="2" fill="#1E293B" transform="rotate(20 126 58)"/>

  <!-- Antennae tips -->
